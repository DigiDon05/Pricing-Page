<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

	<div class="container">

  <div class="card">
    <h2>Basic</h2>
    <h3>$9</h3>
    <p>Starter plan</p>
    <button>Get Started</button>
  </div>

  <div class="card active">
    <h2>Pro</h2>
    <h3>$19</h3>
    <p>Most popular 🚀</p>
    <button>Get Started</button>
  </div>

  <div class="card">
    <h2>Premium</h2>
    <h3>$29</h3>
    <p>Advanced features</p>
    <button>Get Started</button>
  </div>

</div>

</body>
</html>
